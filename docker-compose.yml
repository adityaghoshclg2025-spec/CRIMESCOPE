services:
  # ── Main App (Flask backend + Vue frontend) ──────────────────
  crimescope-app:
    image: ghcr.io/666ghj/mirofish:latest
    container_name: crimescope-app
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads

  # ── Public-facing Marketing Website (nginx static) ───────────
  crimescope-website:
    build:
      context: .
      dockerfile: Dockerfile.website
    container_name: crimescope-website
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - crimescope-app